name: Bug report
description: Report a reproducible debugtools bug
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please keep examples minimal and redact secrets, tokens, cookies, customer data, and private URLs.

  - type: input
    id: route
    attributes:
      label: Affected route or tool
      description: Use the route or module name when possible.
      placeholder: "/tools/api, /tools/json, README.md"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed?
      placeholder: "API Tester imports a nested collection but misses child requests."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Numbered, minimal, and repeatable steps.
      placeholder: |
        1. Open /tools/api
        2. Import the attached sanitized collection
        3. Expand the imported collection
        4. See missing requests
    validations:
      required: true

  - type: textarea
    id: sample-input
    attributes:
      label: Sanitized sample input
      description: Paste the smallest safe input, request shape, JSON, token shape, file excerpt, or fixture that reproduces the bug.
      render: shell
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: dropdown
    id: privacy-boundary
    attributes:
      label: Data boundary
      description: Which behavior best describes this bug?
      options:
        - Local-only tool
        - API Tester user-triggered network request
        - Optional authenticated sync
        - Documentation or project metadata
        - Not sure
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "Chrome 125 on macOS 14, Node 20.11"
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or recording
      description: Attach images or recordings for UI bugs. Redact secrets before uploading.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I removed secrets, credentials, cookies, tokens, and private customer data.
          required: true
        - label: I searched existing issues before opening this report.
          required: true
