name: Feature request
description: Propose a debugtools feature, tool, or workflow improvement
title: "[feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the debugging workflow first. debugtools favors focused, local-first tools and explicit network boundaries.

  - type: textarea
    id: workflow
    attributes:
      label: Workflow
      description: What debugging job should this help with?
      placeholder: "I need to convert cURL commands into repeatable API Tester requests..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should debugtools add or change?
    validations:
      required: true

  - type: textarea
    id: examples
    attributes:
      label: Input and output examples
      description: Include safe sample input and expected output.
      render: shell
    validations:
      required: false

  - type: dropdown
    id: feature-type
    attributes:
      label: Feature type
      options:
        - API Tester workflow
        - New local-first tool
        - Existing tool improvement
        - CLI or shared logic
        - Documentation
        - Project metadata
        - Other
    validations:
      required: true

  - type: dropdown
    id: privacy-model
    attributes:
      label: Privacy model
      description: How should this feature handle user data?
      options:
        - Local-only in the browser
        - User-triggered network request
        - Optional authenticated sync
        - Build-time or documentation only
        - Not sure
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Existing tools, workarounds, or reasons this belongs in debugtools.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I removed secrets, credentials, cookies, tokens, and private customer data.
          required: true
        - label: I searched existing issues and the roadmap.
          required: true
